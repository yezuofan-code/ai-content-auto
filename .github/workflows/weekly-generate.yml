name: 每周自动生成内容

on:
  # 每天 UTC 0:00（北京时间早上 8:00）触发
  schedule:
    - cron: '0 0 * * *'
  # 也支持手动触发
  workflow_dispatch:

jobs:
  generate-content:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests duckduckgo_search

      - name: 生成内容
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          IMAGE_API_KEY: ${{ secrets.IMAGE_API_KEY }}
          GENERATE_DATE: ${{ github.event.repository.updated_at }}
        run: python scripts/run_all.py

      - name: 提交更新
        run: |
          git config user.name "Content Generator Bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          # 如果有变更才提交
          if git diff --staged --quiet; then
            echo "没有新内容需要提交"
          else
            git commit -m "update"
            git push
          fi
